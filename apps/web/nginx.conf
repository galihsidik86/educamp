# ============================================================
# Tazkia SIAKAD Web — nginx server config
# Serves Vite SPA + proxies /api/* → http://api:4000/*
# ============================================================

upstream siakad_api {
  server api:4000;
  keepalive 16;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # security & misc headers
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/json application/javascript
    application/wasm image/svg+xml application/x-font-ttf
    font/woff font/woff2;

  client_max_body_size 5m;

  # ---------- API proxy ----------
  # /api/auth/login → api:4000/auth/login
  location /api/ {
    proxy_pass http://siakad_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ---------- health ----------
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---------- favicon.ico ----------
  # Browser auto-request /favicon.ico walau HTML sudah link icon yang lain.
  # Tanpa handler eksplisit, request ini akan jatuh ke SPA fallback dan
  # mengembalikan HTML untuk request icon — bikin warning di console.
  # 204 No Content menghentikan permintaan diam-diam.
  location = /favicon.ico {
    access_log off;
    log_not_found off;
    return 204;
  }

  # ---------- static cache ----------
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # ---------- SPA fallback ----------
  # Semua route React Router (mis. /login, /mahasiswa/krs) dilayani
  # /index.html. $uri di-fallback ke /index.html jika file tidak ada.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
