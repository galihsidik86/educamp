version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: siakad_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Jakarta
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4.8.1
    container_name: siakad_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: siakad_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      API_PORT: ${API_PORT:-4000}
      TZ: Asia/Jakarta
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./package.json:/app/package.json
      - /app/apps/api/node_modules
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: siakad_web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./components:/app/components:ro
      - ./tokens:/app/tokens:ro
      - ./assets:/app/assets:ro
      - ./styles.css:/app/styles.css:ro
      - ./package.json:/app/package.json
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - api

volumes:
  mysql_data:
