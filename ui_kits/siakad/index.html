<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tazkia SIAKAD — Portal Mahasiswa</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script src="data.js"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const { Sidebar, Topbar, Login } = window.SIAKAD;
const { Dashboard, Krs, Jadwal, Nilai, Profil } = window.SIAKAD_SCREENS;

const SCREENS = { dashboard: Dashboard, krs: Krs, jadwal: Jadwal, nilai: Nilai, profil: Profil };

function App() {
  const [authed, setAuthed] = useState(() => localStorage.getItem("tz_authed") === "1");
  const [screen, setScreen] = useState(() => localStorage.getItem("tz_screen") || "dashboard");

  useEffect(() => { localStorage.setItem("tz_authed", authed ? "1" : "0"); }, [authed]);
  useEffect(() => { localStorage.setItem("tz_screen", screen); }, [screen]);
  useEffect(() => { if (window.lucide) lucide.createIcons(); });

  if (!authed) return <Login onLogin={() => setAuthed(true)} />;

  const Active = SCREENS[screen] || Dashboard;
  return (
    <div className="app">
      <Sidebar active={screen} onNav={setScreen} />
      <div className="main">
        <Topbar screen={screen} onLogout={() => setAuthed(false)} />
        <Active onNav={setScreen} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
