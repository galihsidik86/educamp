<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces & text" subtitle="Page, card, sunken · text roles" -->
<!DOCTYPE html>
<html lang="id"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="row" style="align-items:stretch">
  <div style="flex:1 1 0;min-width:200px;border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden">
    <div style="background:var(--surface-page);padding:14px">
      <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:12px 14px">
        <div style="color:var(--text-strong);font-weight:700;font-size:14px">Surface card</div>
        <div style="color:var(--text-body);font-size:12.5px">on surface page</div>
        <div style="margin-top:8px;background:var(--surface-sunken);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-muted);font-size:12px">surface sunken</div>
      </div>
    </div>
  </div>
  <div class="col" style="flex:1 1 0;min-width:180px;justify-content:center;gap:6px">
    <div style="color:var(--text-strong);font-weight:700;font-size:15px">text-strong — judul</div>
    <div style="color:var(--text-body);font-size:14px">text-body — isi paragraf</div>
    <div style="color:var(--text-muted);font-size:13px">text-muted — meta data</div>
    <div style="color:var(--text-subtle);font-size:13px">text-subtle — placeholder</div>
    <div style="background:var(--surface-brand);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text-onbrand);font-size:13px;width:fit-content">text-onbrand</div>
  </div>
</div>
</body></html>
