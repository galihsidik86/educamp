<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success · Warning · Danger · Info" -->
<!DOCTYPE html>
<html lang="id"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="row">
  <div style="flex:1 1 0;min-width:120px;border:1px solid var(--success-border);background:var(--success-surface);border-radius:var(--radius-md);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:var(--success-fg)"></span><span style="font-weight:700;font-size:13px;color:var(--success-fg)">Lulus / Success</span></div>
    <div class="token-name" style="margin-top:8px">--success-*</div>
  </div>
  <div style="flex:1 1 0;min-width:120px;border:1px solid var(--warning-border);background:var(--warning-surface);border-radius:var(--radius-md);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:var(--warning-fg)"></span><span style="font-weight:700;font-size:13px;color:var(--warning-fg)">Menunggu / Warning</span></div>
    <div class="token-name" style="margin-top:8px">--warning-*</div>
  </div>
  <div style="flex:1 1 0;min-width:120px;border:1px solid var(--danger-border);background:var(--danger-surface);border-radius:var(--radius-md);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:var(--danger-fg)"></span><span style="font-weight:700;font-size:13px;color:var(--danger-fg)">Gagal / Danger</span></div>
    <div class="token-name" style="margin-top:8px">--danger-*</div>
  </div>
  <div style="flex:1 1 0;min-width:120px;border:1px solid var(--info-border);background:var(--info-surface);border-radius:var(--radius-md);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:var(--info-fg)"></span><span style="font-weight:700;font-size:13px;color:var(--info-fg)">Info</span></div>
    <div class="token-name" style="margin-top:8px">--info-*</div>
  </div>
</div>
</body></html>
