<!-- @dsCard group="Spacing" viewport="700x185" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="id"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:7px">
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-1</span><span style="height:14px;width:4px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">4px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-2</span><span style="height:14px;width:8px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">8px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-3</span><span style="height:14px;width:12px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">12px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-4</span><span style="height:14px;width:16px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">16px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-6</span><span style="height:14px;width:24px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">24px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-8</span><span style="height:14px;width:32px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">32px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-12</span><span style="height:14px;width:48px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">48px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><span class="token-name" style="width:80px">--space-16</span><span style="height:14px;width:64px;background:var(--blue-600);border-radius:3px"></span><span style="font-size:12px;color:var(--text-muted)">64px</span></div>
</div>
</body></html>
